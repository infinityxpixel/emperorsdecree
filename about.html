<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Pixel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'IBM Plex Mono', monospace;
            -webkit-font-smoothing: antialiased;
            text-transform: uppercase;
        }

        .img-container {
            width: fit-content;
            height: fit-content;
            background-color: transparent;
        }

        /* 
           Refined Monochromatic Filter:
           Uses a slight desaturation with a touch of brightness 
           to create a clean, "Silver" photographic look.
        */
        .img-bw {
            max-height: 80vh;
            max-width: 100%;
            display: block;
            filter: grayscale(100%) brightness(1.1) contrast(1.1);
            transition: filter 0.6s ease-in-out;
        }

        /* Subtle reveal on hover */
        .img-bw:hover {
            filter: grayscale(0%) brightness(1) contrast(1);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-6 md:p-12">

    <nav class="flex justify-between items-start w-full mb-12 md:mb-16 text-[10px] tracking-tighter">
        <div class="font-medium">Infinity Pixel</div>
        <div class="text-zinc-600">v.2026 / Infinity Pixel</div>
    </nav>

    <main class="flex-grow grid grid-cols-1 md:grid-cols-12 gap-12 items-center">
        
        <!-- Left Section -->
        <div class="md:col-span-6 lg:col-span-7 flex justify-start">
            <div class="img-container md:ml-16"> <!-- Shifted slightly more to the right -->
                <img 
                    src="me.jpg" 
                    alt="Mario M Concept" 
                    class="img-bw"
                    onerror="this.src='https://raw.githubusercontent.com/infinityxpixel/emperorsdecree/cc2959eede6d49d8a4c83a94afc93d8c6533f7ef/photo-1506744038136-46273834b3fb.png?q=80&w=1000&auto=format&fit=crop'"
                >
            </div>
        </div>

        <!-- Right Section: Text -->
        <div class="md:col-span-6 lg:col-span-5 flex flex-col gap-10 text-[11px] leading-relaxed tracking-tight">
            <div class="border-t border-zinc-800 pt-8">
                <p class="text-zinc-400 mb-2">Conceptualized and developed by</p>
                <p class="text-white text-lg">Mario M</p>
                <p class="text-zinc-500 mt-4">
                    Developer of 
                    <a href="https://infinityxpixel.github.io/home/" class="text-white underline underline-offset-4 decoration-zinc-700 hover:decoration-white transition-all">Infinity Pixel</a>.
                </p>
            </div>
            
            <div class="flex flex-col gap-4">
                <div class="flex justify-between border-b border-zinc-900 pb-2">
                    <span class="text-zinc-600">game</span>
                    <span>Emperor's Decree - Spalatum</span>
                </div>
                <div class="flex justify-between border-b border-zinc-900 pb-2">
                    <span class="text-zinc-600">Release Date</span>
                    <span>2026</span>
                </div>
                <div class="flex justify-between border-b border-zinc-900 pb-2">
                    <span class="text-zinc-600">contact</span>
                    <span>infinitypixelhub@proton.me</span>
                </div>
            </div>

            <div class="mt-4">
                <p class="text-[9px] text-zinc-700 max-w-xs">
                    All rights reserved infinity pixel
                </p>
            </div>
        </div>
    </main>

    <footer class="mt-16 pt-8 border-t border-zinc-900 flex flex-col md:flex-row justify-between items-center text-[9px] text-zinc-500 gap-4">
        <div class="flex gap-6">
            <span>© 2026 Infinity Pixel</span>
            <span>All Rights Reserved</span>
        </div>
        <div class="tracking-[0.4em] text-white font-medium">Infinity Pixel</div>
    </footer>

</body>
</html>
